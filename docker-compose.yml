services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-ijara}
      POSTGRES_USER: ${POSTGRES_USER:-ijara}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-ijara_dev}
    volumes:
      - db_data:/var/lib/postgresql/data
      - ./backend/scripts/init_extensions.sql:/docker-entrypoint-initdb.d/10_extensions.sql:ro
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-ijara} -d ${POSTGRES_DB:-ijara}"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 5s
    networks: [ijara]

  api:
    build:
      context: ./backend
      args:
        GIT_SHA: ${GIT_SHA:-unknown}
    command: /app/scripts/entrypoint.sh
    environment:
      DJANGO_SECRET_KEY: ${DJANGO_SECRET_KEY:-dev-insecure-key-change-me-before-anything-public}
      DJANGO_DEBUG: ${DJANGO_DEBUG:-1}
      DJANGO_AUTO_SEED: ${DJANGO_AUTO_SEED:-1}
      DJANGO_ALLOWED_HOSTS: ${DJANGO_ALLOWED_HOSTS:-localhost,127.0.0.1,api}
      DATABASE_URL: postgres://${POSTGRES_USER:-ijara}:${POSTGRES_PASSWORD:-ijara_dev}@db:5432/${POSTGRES_DB:-ijara}
      DJANGO_CORS_ALLOWED_ORIGINS: ${DJANGO_CORS_ALLOWED_ORIGINS:-http://localhost:3000}
      DJANGO_CSRF_TRUSTED_ORIGINS: ${DJANGO_CSRF_TRUSTED_ORIGINS:-http://localhost:3000}
      GIT_SHA: ${GIT_SHA:-unknown}
      DJANGO_MEDIA_HOST: ${DJANGO_MEDIA_HOST:-http://localhost:8000}
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY:-}
      STRIPE_WEBHOOK_SECRET: ${STRIPE_WEBHOOK_SECRET:-}
      NUXT_PUBLIC_STRIPE_PUBLISHABLE_KEY: ${NUXT_PUBLIC_STRIPE_PUBLISHABLE_KEY:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_MODEL: ${OPENAI_MODEL:-gpt-4o-mini}
    volumes:
      - media_data:/app/media
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8000/api/v1/health/ || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    ports:
      - "8000:8000"
    develop:
      watch:
        - action: sync
          path: ./backend
          target: /app
          ignore:
            - .venv/
            - __pycache__/
            - "*.pyc"
            - .pytest_cache/
            - .ruff_cache/
            - .mypy_cache/
        - action: rebuild
          path: ./backend/pyproject.toml
        - action: rebuild
          path: ./backend/uv.lock
    networks: [ijara]

  web:
    build:
      context: ./frontend
    command: npm run dev
    environment:
      NUXT_API_BASE_SERVER: http://api:8000/api/v1/
      NUXT_PUBLIC_API_BASE: ${NUXT_PUBLIC_API_BASE:-http://localhost:8000/api/v1/}
      NUXT_PUBLIC_DJANGO_HOST: ${NUXT_PUBLIC_DJANGO_HOST:-http://localhost:8000}
      NUXT_PUBLIC_STRIPE_PUBLISHABLE_KEY: ${NUXT_PUBLIC_STRIPE_PUBLISHABLE_KEY:-}
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000/ >/dev/null || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    ports:
      - "3000:3000"
    develop:
      watch:
        - action: sync
          path: ./frontend
          target: /app
          ignore:
            - node_modules/
            - .nuxt/
            - .output/
            - dist/
        - action: rebuild
          path: ./frontend/package.json
        - action: rebuild
          path: ./frontend/package-lock.json
    networks: [ijara]

volumes:
  db_data:
  media_data:

networks:
  ijara:
    driver: bridge
